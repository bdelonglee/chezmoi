set-option -g default-terminal 'tmux-256color'
set-option -g terminal-overrides ',xterm-256color:RGB'

########################################################################################
# -------- GLOBAL OPTIONS
########################################################################################


set -g prefix C-a			  # set Ctrl-a as the default prefix key combination and unbind C-b to free it up  
unbind C-b				  # unbind default leader key reload ~/.tmux.conf using PREFIX r 
bind r source-file ~/.config/tmux/tmux.conf \; display "Tmux Config Reloaded!" 
set-option -g mouse on                    # Enable mouse 
set -g base-index 1                       # start indexing windows at 1 instead of 0 
set -g renumber-windows on                # renumber all windows when any window is closed
set -g detach-on-destroy off              # don't exit from tmux when closing a session
set -g escape-time 0                      # zero-out escape time delay
set -g history-limit 1000000              # increase history size (from 2,000)
set -g set-clipboard on                   # use system clipboard
set -g status-position top                # macOS / darwin style
set -g default-terminal "${TERM}"
# set-option -g status-keys vi              # Vim Keys
set -g status-keys emacs		  # Emacs key binding (better tahn VI )
setw -g mode-keys vi                      #
set -g focus-events on			  # Focus Events if terminal supports it
set -g display-time 2000                  # display messages for 2 seconds
set -g status-interval 5		  # Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g set-titles off                     # prevent tmux to rename windows
setw -g automatic-rename off              #
set-option -g allow-rename off            #
set-window-option -g monitor-activity off # Enable activity Alerts
set -g visual-activity off                #
setw -g xterm-keys on                     # Pass xterm-style keys to make many key combinations work as expected
set -g extended-keys always               # Request full modifier reporting (Ctrl+Alt+Shift etc.) from the terminal
set -g terminal-features[0] 'xterm*:clipboard:ccolour:cstyle:focus:title:extkeys' # Tell tmux the outer terminal (WezTerm, reports as xterm-256color) supports extended keys too
setw -g aggressive-resize on              # fit pane to minimal size for shared session
set -g display-panes-time 1500            # how long to show pane numbers, (which is 1.5sec)
# set -g pane-active-border-style 'fg=magenta,bg=default'
# set -g pane-border-style 'fg=brightblack,bg=default'

	################################################################################
	# -------- TESTER FZF
	################################################################################
	# fzf-locate
	# bind-key -n 'M-`' run "tmux split-window -p 40 'tmux send-keys -t #{pane_id} \"$(locate / | fzf -m | paste -sd\\  -)\"'"

	# list panes
	bind-key Space list-panes


########################################################################################
# -------- BINDINGS 
########################################################################################

# Make Prefix + 0 go to window number 10
bind 0 select-window -t :10

# use PREFIX | to split window horizontally and PREFIX - to split vertically
bind \\ split-window -h
bind - split-window -v
bind | split-window -fh
bind _ split-window -fv 
unbind '"' # unbind horizontal split
unbind % # unbind vertical split

# If prefix is 'C-a'
bind C-a send-prefix
bind a last-window

# Easy pane resizing with Prefix + Alt-h/j/k/l
bind -r Left resize-pane -L 7
bind -r Down resize-pane -D 5
bind -r Up resize-pane -U 5
bind -r Right resize-pane -R 5

# break-pane
bind-key Enter break-pane

########################################################################################
# -------- EXTRAS BINDINGS
########################################################################################

# Do not display the original window’s name when renaming it via Prefix + ,
# This makes renaming faster
bind , command-prompt -p "(rename-window '#W')" "rename-window '%%'"
# Do the same for session names
bind '$' command-prompt -p "(rename-session '#S')" "rename-session '%%'"

# Make Prefix + f search only in window names (-N), 
# not in titles (-T) or contents (-C)
# bind f command-prompt -p "(find-window)" "find-window -N '%%'"

bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"

# Toggle pane synchronization with Prefix + S
# bind S set synchronize-panes

# Highend windows listing
# bind w choose-tree -u
# VIM copy mode
# bind -t vi-copy v begin-selection
# bind -t vi-copy C-v rectangle-toggle
# bind -t vi-copy y copy-pipe "xclip -filter -selection clipboard | xclip -selection primary"

########################################################################################
# -------- NAVIGATION
########################################################################################

# Maximize and restore a pane
# unbind Up 
# bind Up new-window -d -n tmp \; swap-pane -s tmp.1 \; select-window -t tmp
#
# unbind Down
# bind Down last-window \; swap-pane -s tmp.1 \; kill-window -t tmp

# Movement of windows with Prefix + < and Prefix + >
bind -r < swap-window -t -1
bind -r > swap-window -t +1

# cycle windows/panes (no prefix)
bind-key -n C-M-h select-window -t :-	# previous window
bind-key -n C-M-l select-window -t :+ # next window

# move window left/right and follow it (no prefix)
bind-key -n C-M-H swap-window -d -t -1
bind-key -n C-M-L swap-window -d -t +1

# Refine Layout
bind o select-layout "active-only"
bind M-- select-layout "even-vertical"
bind M-\\ select-layout "even-horizontal"
bind M-r rotate-window

########################################################################################
# -------- Tmux / Vim Change Panes
########################################################################################

# Works with vim-tmux-navigator in VIM
# smart pane switching with awareness of vim splits
bind -n C-h  run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h)    || tmux select-pane -L"
bind -n C-j  run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j)    || tmux select-pane -D"
bind -n C-k  run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k)    || tmux select-pane -U"
bind -n C-l  run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l)    || tmux select-pane -R"
# bind -n C-\\ run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys 'C-\\') || tmux select-pane -l"

# bind -n C-Left  run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-h) || tmux select-pane -L"
# bind -n C-Down  run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-j) || tmux select-pane -D"
# bind -n C-Up    run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-k) || tmux select-pane -U"
# bind -n C-Right run "(tmux display-message -p '#{pane_current_command}' | grep -iq vim && tmux send-keys C-l) || tmux select-pane -R"

set -g pane-border-lines "heavy"

########################################################################################
# -------- TPM PLUGIN MANAGER
########################################################################################

# Pin explicitly so TPM always manages ~/.config/tmux/plugins, regardless of
# whether this variable happens to be set in the current shell/server env.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.config/tmux/plugins/"

# https://github.com/tmux-plugins/tpm
set -g @plugin 'tmux-plugins/tpm'

# -------- TMUX-SENSIBLE ---------------------------------------------------------------
# https://github.com/tmux-plugins/tmux-sensible
# A set of tmux options that should be acceptable to everyone.
set -g @plugin 'tmux-plugins/tmux-sensible'

# -------- TMUX-YANK -------------------------------------------------------------------
# https://github.com/tmux-plugins/tmux-yank
# DOC
# prefix–y — copies selected text from the command line to the clipboard.
# prefix–Y — copy the current pane's current working directory to the clipboa
# y — copy selection to system clipboard.
# Y (shift-y) — "put" selection. Equivalent to copying a selection, and pasting it to the command line.
set -g @plugin 'tmux-plugins/tmux-yank'

# -------- RESURRECT TMUX SESSION ------------------------------------------------------
# https://github.com/tmux-plugins/tmux-resurrect
# DOC
# prefix + Ctrl-s - save
# prefix + Ctrl-r - restore

# Try to make tmux resurrect to reload nvim state. (from reddit)
resurrect_dir="$HOME/.config/tmux/resurrect"
set -g @resurrect-dir $resurrect_dir
set -g @resurrect-hook-post-save-all 'target=$(readlink -f $resurrect_dir/last); sed "s| --cmd .*-vim-pack-dir||g; s|/etc/profiles/per-user/$USER/bin/||g; s|/home/$USER/.nix-profile/bin/||g" $target | sponge $target'

set -g @plugin 'tmux-plugins/tmux-resurrect'
	# for vim
	set -g @resurrect-strategy-vim 'session'
	# resurrect tmux pane contents
	set -g @resurrect-capture-pane-contents 'on'
	# for neovim
	set -g @resurrect-strategy-nvim 'session'
  # Restore pane content
  set -g @resurrect-capture-pane-contents 'on'

# -------- TMUX-CONTINUUM --------------------------------------------------------------
# https://github.com/tmux-plugins/tmux-continuum
# DOC
# Save and restore continuously
set -g @plugin 'tmux-plugins/tmux-continuum'
	set -g @continuum-restore 'on'

# -------- TMUX-FZF --------------------------------------------------------------------
# https://github.com/sainnhe/tmux-fzf
# DOC
# prefix + F (Shift+F).
# set -g @plugin 'sainnhe/tmux-fzf'

# -------- TMUX-FZF-URL ----------------------------------------------------------------
# https://github.com/wfxr/tmux-fzf-url
# A tmux plugin for opening urls from browser quickly without mouse.
# DOC
# prefix + u
# to change it
# set -g @fzf-url-bind 'x'
set -g @plugin 'wfxr/tmux-fzf-url'
	set -g @fzf-url-fzf-options '-p 60%,30% --prompt="   " --border-label=" Open URL "'
	set -g @fzf-url-history-limit '2000'
	set -g @fzf-url-open "open -a /Applications/Firefox.app"


# -------- NEOLAZYGIT ------------------------------------------------------------------
# https://github.com/AngryMorrocoy/tmux-neolazygit
# DOC
# prefix + G
# To change it
# set -g @open-lazygit 'G'
set -g @plugin 'AngryMorrocoy/tmux-neolazygit'

# -------- TREEMUX ---------------------------------------------------------------------
# https://github.com/kiyoon/treemux
# DOC
# uses Nvim-tree
# also need to update Nvim plusgins after tmux install
# prefix + Tab - toggle sidebar with a directory tree
# prefix + Backspace - toggle sidebar and move cursor to it (focus it)
set -g @treemux-tree-nvim-init-file '~/.config/tmux/plugins/treemux/configs/treemux_init.lua'
set -g @plugin 'kiyoon/treemux'

# -------- TMUX-JUMP -------------------------------------------------------------------
